apiVersion: batch/v1
kind: Job
metadata:
  name: oulad-serving-export-job
  namespace: blearn-medallion
spec:
  template:
    spec:
      containers:
      - name: export-pipeline
        image: acrblearnminh2026.azurecr.io/oulad-medallion:latest
        imagePullPolicy: Always
        command: ["python", "-m", "data_pipeline.jobs.export_to_serving"]
        resources:
          requests:
            cpu: "0.8"
            memory: "4Gi"
          limits:
            cpu: "1.5"
            memory: "6Gi"
        env:
        - name: AZURE_STORAGE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_ACCOUNT
        - name: AZURE_STORAGE_KEY
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_KEY
        - name: SPARK_DRIVER_MEMORY
          value: "3g"
      restartPolicy: Never
  backoffLimit: 0
