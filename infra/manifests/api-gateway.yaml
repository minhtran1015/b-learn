apiVersion: apps/v1
kind: Deployment
metadata:
  name: blearn-api-gateway
  namespace: blearn-medallion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: acrblearnminh2026.azurecr.io/oulad-medallion:latest
        imagePullPolicy: Always
        command: ["python", "-m", "data_pipeline.jobs.serving_gateway"]
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        env:
        - name: AZURE_STORAGE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_ACCOUNT
        - name: AZURE_STORAGE_KEY
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: blearn-api-service-gateway
  namespace: blearn-medallion
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: api-gateway
