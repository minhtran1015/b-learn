apiVersion: batch/v1
kind: Job
metadata:
  name: oulad-gold-bkt-test
  namespace: blearn-medallion
spec:
  template:
    spec:
      containers:
      - name: bkt-pipeline
        image: acrblearnminh2026.azurecr.io/oulad-medallion:latest
        imagePullPolicy: Always
        command: ["python", "-m", "data_pipeline.jobs.gold_bkt_pipeline"]
        resources:
          requests:
            cpu: "1.5"
            memory: "4Gi"
          limits:
            cpu: "1.8"
            memory: "8Gi"
        env:
        - name: AZURE_STORAGE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_ACCOUNT
        - name: AZURE_STORAGE_KEY
          valueFrom:
            secretKeyRef:
              name: oulad-runtime
              key: AZURE_STORAGE_KEY
        - name: SPARK_DRIVER_MEMORY
          value: "8g"
      restartPolicy: Never
  backoffLimit: 0
